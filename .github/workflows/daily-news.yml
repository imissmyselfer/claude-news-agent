name: 每日新聞自動發布

on:
  # 每天台灣時間早上 8:00 執行（UTC+8，所以 UTC 是 00:00）
  schedule:
    - cron: "0 0 * * *"

  # 允許手動在 GitHub 介面觸發
  workflow_dispatch:
    inputs:
      url:
        description: "手動指定文章 URL（留空則執行每日自動模式）"
        required: false
        default: ""

jobs:
  publish-news:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取最新程式碼
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 安裝相依套件
        run: pip install -r requirements.txt

      - name: 安裝 Node.js 與 Claude CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.claude/bin" >> $GITHUB_PATH

      - name: 執行新聞 Agent（自動模式）
        if: ${{ github.event.inputs.url == '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python agent/main.py

      - name: 執行新聞 Agent（手動 URL 模式）
        if: ${{ github.event.inputs.url != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python agent/main.py --url "${{ github.event.inputs.url }}"

- name: 提交並推送新文章
        run: |
          git config user.name "News Bot"
          git config user.email "bot@newsbot.local"
          git add output/posts/
          git diff --staged --quiet || git commit -m "📰 自動發布新聞 $(date +'%Y-%m-%d')"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

